services:
  g1_dev:
    image: g1-robot-dev:humble-gpu-v1
    container_name: g1-dev-${USER}
    network_mode: host
    ipc: host
    privileged: true
    stdin_open: true
    tty: true
    working_dir: /workspace

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    volumes:
      - ../:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    command: bash
